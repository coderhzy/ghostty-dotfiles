name: Sync upstream Ghostty config

on:
  schedule:
    # Every day at 08:00 UTC (16:00 Beijing time)
    - cron: '0 8 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch upstream BruceBlue config
        run: |
          curl -fsSL https://raw.githubusercontent.com/BruceLanLan/bruceblue-ghostty-config/main/config \
            -o /tmp/upstream-config

      - name: Compare and update
        run: |
          if ! diff -q ghostty/upstream-bruceblue.config /tmp/upstream-config > /dev/null 2>&1; then
            echo "CHANGED=true" >> $GITHUB_ENV
            cp /tmp/upstream-config ghostty/upstream-bruceblue.config
            echo "📝 Upstream config has changed"
          else
            echo "CHANGED=false" >> $GITHUB_ENV
            echo "✅ No changes detected"
          fi

      - name: Commit and push
        if: env.CHANGED == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ghostty/upstream-bruceblue.config
          git commit -m "chore: sync upstream BruceBlue config $(date +%Y-%m-%d)"
          git push
